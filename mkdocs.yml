site_name: AI1SAD Documentation
site_description: Adaptive Intelligence for Integrated Shark Activity Detection
site_url: https://jride-dev.github.io/AI1SAD/
repo_url: https://github.com/Jride-Dev/AI1SAD
repo_name: Jride-Dev/AI1SAD
theme:
  name: material
  logo: assets/brand/ai1sad-emblem.png
  favicon: assets/brand/favicon.png
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.select

plugins:
  - search

extra:
  social_preview_image: assets/brand/ai1sad-social-banner.png

extra_css:
  - stylesheets/brand.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md

  - Overview:
      - Brand Identity: BRAND_IDENTITY.md
      - Asset Checklist: ASSET_CHECKLIST.md
      - Brand Deployment Map: BRAND_DEPLOYMENT_MAP.md
      - Portal Guide: MKDOCS_PORTAL.md
      - Deployment Readiness: DEPLOYMENT_READINESS.md
      - Source Comparison: SOURCE_COMPARISON.md
      - Data Sources: DATA_SOURCES.md
      - Data Quality: DATA_QUALITY.md
      - Ethics & Limitations: ETHICS_AND_LIMITATIONS.md
      - Disclaimer: DISCLAIMER.md
      - Usage Policy: USAGE_POLICY.md

  - API:
      - API Reference: API.md
      - API Access Tiers: API_ACCESS_TIERS.md
      - Schema: SCHEMA.md
      - Privacy: PRIVACY.md
      - MongoDB: MONGODB.md

  - Model:
      - Risk Model: RISK_MODEL.md
      - Regional Risk Profiles: REGIONAL_RISK_PROFILES.md
      - Species Season Profiles: SPECIES_SEASON_PROFILES.md
      - Surveillance Engine: SURVEILLANCE_ENGINE.md
      - Explainability Engine: EXPLAINABILITY_ENGINE.md
      - Confidence Interpretation: CONFIDENCE_INTERPRETATION.md

  - Regional Packs:
      - Regional Packs: REGIONAL_PACKS.md
      - Pack Entitlements: PACK_ENTITLEMENTS.md

  - Providers:
      - Current Data Sources: CURRENT_DATA_SOURCES.md
      - Signal Broker: SIGNAL_BROKER.md
      - Provider Health: PROVIDER_HEALTH.md
      - Open-Meteo: OPEN_METEO_PROVIDER.md
      - NOAA/NWS: NOAA_NWS_PROVIDER.md
      - SST Provider: SST_PROVIDER.md
