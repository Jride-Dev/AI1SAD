site_name: AI1SAD Documentation
site_description: Adaptive Intelligence for Integrated Shark Activity Detection
site_url: https://jride-dev.github.io/AI1SAD/
repo_url: https://github.com/Jride-Dev/AI1SAD
repo_name: Jride-Dev/AI1SAD
theme:
  name: material
  logo: assets/brand/ai1sad-emblem.png
  favicon: assets/brand/favicon.png
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.select

plugins:
  - search

extra:
  social_preview_image: assets/brand/ai1sad-social-banner.png

extra_css:
  - stylesheets/brand.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

