      - Cromwell's Beach Hawaii 2026: case_studies/cromwells_beach_hawaii_2026.md

  - Alerts & Operations:
      - Alert Engine: ALERT_ENGINE.md
      - Alert Levels: ALERT_LEVELS.md
      - Operational Mapping: OPERATIONAL_MAPPING.md
